<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f2f6"/>
      <stop offset="0.55" stop-color="#eceef2"/>
      <stop offset="1" stop-color="#e4ecf6"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6f8aa6"/>
    </marker>
    <marker id="ahT" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4d6265"/>
    </marker>
  </defs>

  <rect width="520" height="520" fill="url(#bg)"/>
  <g filter="url(#soft)">
    <circle cx="70" cy="70" r="150" fill="#9fd4e2" opacity="0.5"/>
    <circle cx="460" cy="460" r="160" fill="#b3ccec" opacity="0.5"/>
  </g>

  <!-- header -->
  <text x="40" y="54" fill="#4d6265" font-size="13" letter-spacing="2.5" font-weight="700">MULTI-CLOUD, PORTABLE BY DESIGN</text>
  <text x="40" y="78" fill="#5e7387" font-size="12.5">Infrastructure as code that fails over or swaps clouds.</text>

  <!-- AWS (live) -->
  <rect x="40" y="150" width="150" height="96" rx="22" fill="#ffffff" stroke="#cdd8e4"/>
  <text x="115" y="196" fill="#1a1c1c" font-size="22" font-weight="700" letter-spacing="1" text-anchor="middle">AWS</text>
  <text x="115" y="222" fill="#2f9e6f" font-size="10" font-weight="700" letter-spacing="1.5" text-anchor="middle">● LIVE</text>

  <!-- GCP (ready) -->
  <rect x="330" y="150" width="150" height="96" rx="22" fill="#ffffff" stroke="#cdd8e4"/>
  <text x="405" y="196" fill="#1a1c1c" font-size="22" font-weight="700" letter-spacing="1" text-anchor="middle">GCP</text>
  <text x="405" y="222" fill="#8a9298" font-size="10" font-weight="700" letter-spacing="1.5" text-anchor="middle">○ READY</text>

  <!-- swap loop between clouds -->
  <line x1="190" y1="198" x2="224" y2="198" stroke="#6f8aa6" stroke-width="2"/>
  <line x1="296" y1="198" x2="330" y2="198" stroke="#6f8aa6" stroke-width="2"/>
  <path d="M226,198 A34,34 0 0 1 294,198" fill="none" stroke="#4d6265" stroke-width="3" marker-end="url(#ahT)"/>
  <path d="M294,198 A34,34 0 0 1 226,198" fill="none" stroke="#4d6265" stroke-width="3" marker-end="url(#ahT)"/>
  <text x="260" y="258" fill="#4d6265" font-size="10" font-weight="700" letter-spacing="1.5" text-anchor="middle">FAILOVER / SWAP</text>

  <!-- Terraform provisions both -->
  <line x1="115" y1="318" x2="115" y2="250" stroke="#6f8aa6" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="405" y1="318" x2="405" y2="250" stroke="#6f8aa6" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="40" y="320" width="440" height="56" rx="16" fill="#eef2f7" stroke="#cdd8e4"/>
  <text x="260" y="354" fill="#4d6265" font-size="13" font-weight="600" text-anchor="middle">TERRAFORM IaC · one config, any cloud</text>

  <!-- caption -->
  <text x="260" y="432" fill="#5e7387" font-size="12.5" text-anchor="middle">Fail over or migrate clouds in hours, from the same config.</text>
</svg>
