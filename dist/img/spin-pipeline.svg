<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f2f6"/>
      <stop offset="0.55" stop-color="#eceef2"/>
      <stop offset="1" stop-color="#e4ecf6"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d6265"/>
      <stop offset="1" stop-color="#41586b"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6f8aa6"/>
    </marker>
  </defs>

  <rect width="800" height="360" fill="url(#bg)"/>

  <!-- icy-blue atmospheric glows (contrast behind the white cards) -->
  <g filter="url(#soft)">
    <circle cx="80" cy="60" r="150" fill="#9fd4e2" opacity="0.5"/>
    <circle cx="470" cy="360" r="160" fill="#b3ccec" opacity="0.5"/>
    <circle cx="780" cy="70" r="120" fill="#cfe0f3" opacity="0.55"/>
  </g>

  <!-- header -->
  <text x="48" y="54" fill="#4d6265" font-size="13" letter-spacing="3" font-weight="700">AI CONTENT MODERATION PIPELINE</text>
  <text x="48" y="78" fill="#5e7387" font-size="13">Visual and language signals kept separate, contextual judgment last.</text>

  <!-- flow annotations -->
  <text x="48" y="118" fill="#7f95ad" font-size="11" letter-spacing="1.5" font-weight="600">INPUT · IMAGE / VIDEO</text>
  <text x="752" y="118" fill="#7f95ad" font-size="11" letter-spacing="1.5" font-weight="600" text-anchor="end">OUTPUT · VERDICT → MONGODB</text>

  <!-- stage 1 -->
  <rect x="48" y="132" width="208" height="112" rx="18" fill="#ffffff" stroke="#cdd8e4"/>
  <circle cx="86" cy="170" r="16" fill="url(#badge)"/>
  <text x="86" y="175" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="109" y="175" fill="#1a1c1c" font-size="15" font-weight="600">AWS Rekognition</text>
  <text x="102" y="205" fill="#5e7387" font-size="12.5">Visual hard-gate</text>
  <text x="102" y="224" fill="#5e7387" font-size="12.5">on frames and labels</text>

  <!-- stage 2 -->
  <rect x="296" y="132" width="208" height="112" rx="18" fill="#ffffff" stroke="#cdd8e4"/>
  <circle cx="334" cy="170" r="16" fill="url(#badge)"/>
  <text x="334" y="175" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="357" y="175" fill="#1a1c1c" font-size="15" font-weight="600">OpenAI Moderation</text>
  <text x="350" y="205" fill="#5e7387" font-size="12.5">Language signals only</text>
  <text x="350" y="224" fill="#5e7387" font-size="12.5">(transcribe + text)</text>

  <!-- stage 3 -->
  <rect x="544" y="132" width="208" height="112" rx="18" fill="#ffffff" stroke="#cdd8e4"/>
  <circle cx="582" cy="170" r="16" fill="url(#badge)"/>
  <text x="582" y="175" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="605" y="175" fill="#1a1c1c" font-size="15" font-weight="600">GPT-4o</text>
  <text x="598" y="205" fill="#5e7387" font-size="12.5">Contextual judgment,</text>
  <text x="598" y="224" fill="#5e7387" font-size="12.5">structured JSON output</text>

  <!-- arrows -->
  <line x1="256" y1="188" x2="292" y2="188" stroke="#6f8aa6" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="504" y1="188" x2="540" y2="188" stroke="#6f8aa6" stroke-width="2" marker-end="url(#ah)"/>

  <!-- footer caption -->
  <line x1="48" y1="288" x2="752" y2="288" stroke="#ccd7e4" stroke-width="1"/>
  <text x="400" y="316" fill="#5e7387" font-size="12.5" text-anchor="middle">Re-architected monolith → microservices  ·  Terraform IaC on AWS  ·  async video via SNS + DynamoDB Streams</text>
</svg>
